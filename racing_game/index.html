<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awesome Racing Game!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="top-bar">
            <span id="pos-display">Position: 5th</span>
            <span id="score-display">Laps: 0 / 1</span>
        </div>
        <div id="ui-layer">
            <div id="game-over" class="hidden">
                <h2>CRASH! 💥</h2>
                <p>You did great!</p>
                <button id="restart-btn">Play Again!</button>
            </div>
            <div id="start-screen">
                <h2>Ready to Race? 🏎️</h2>
                <p>Use Up/Down arrow keys to dodge!</p>
                <button id="start-btn">GO!</button>
            </div>
        </div>
        <canvas id="game-canvas" width="800" height="600"></canvas>
    </div>
    <script src="script.js"></script>
</body>
</html>
