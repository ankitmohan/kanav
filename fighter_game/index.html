<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Cool Racing Game!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>🏎️ Super Cool Racing Game! 🏎️</h1>
    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
    </div>
    <p>
        ⬅️/➡️ to Steer | ⬆️ to Speed Up | ⬇️ to Brake<br>
        <strong>Press SPACEBAR to paint your car a new color! 🎨</strong><br>
        <strong>Press V to toggle 3D DRIVER'S VIEW! 🕶️</strong><br>
        <strong>🎵 Press any arrow key to start the MUSIC! 🎵</strong>
    </p>
    <script src="game.js"></script>
</body>
</html>
